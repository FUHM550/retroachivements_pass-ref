<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emu-Credential-Guard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <h1>Password Refresher</h1>
        
        <!-- this items are supposed to increase when the user adds a path and have nothing when there is no path registered -->
        <!-- stock items -->
        <div class="stdr-emu-bar">
            <button class="emu-pill active">RETROARCH <span class="dot"></span></button>
            <button class="emu-pill">DUCKSTATION <span class="dot"></span></button>
            <button class="emu-pill">PCSX2 <span class="dot"></span></button>
            <button class="emu-pill">DOLPHIN <span class="dot"></span></button>
        </div>

    </header>

    <main class="container">
        <div class="config-grid">
            <section class="card">
                <div class="head">EMULATOR</div>
                <select name="EMU_TYPE" id="emu-select" class="full-select">
                    <option value="RETROARCH">RETROARCH</option>
                    <option value="DUCKSTATION">DUCKSTATION</option>
                    <option value="PCSX2">PCSX2</option>
                    <option value="DOLPHIN">DOLPHIN</option>
                    <option value="OTHER">OTHER (Custom)</option>
                </select>
                <input type="text" id="custom-emu-name" placeholder="Enter Name..." style="display:none;">
            </section>

            <section class="card">
                <div class="head">PATH</div>
                <div class="path-container">
                    <button class="detect-btn">DETECT</button>
                    <input type="text" class="path-input" value="~/.config/retroarch/" readonly>
                </div>
            </section>
        </div>

        <button class="add-emu-btn">ADD EMULATOR</button>

        <div class="config-grid">
            <section class="card">
                <div class="head">USER</div>
                <input type="text" placeholder="User Name">
            </section>
            <section class="card">
                <div class="head">PASSWORD</div>
                <input type="text" placeholder="••••••••">
            </section>
        </div>

        <section class="card full-width">
            <div class="head">STORED</div>
            <select name="STORED" id="STORED">
                <option value="user1">USER_1</option>
                <option value="user2">USER_2</option>
            </select>
        </section>

        <footer>
            <button class="del-btn">DELETE STORED USER</button>
            <button class="refr-btn">REFRESH EMULATORS</button>
        </footer>
    </main>
</body>
</html>
